apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-app
  namespace: rag-app
  labels:
    app: rag-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rag-app
  template:
    metadata:
      labels:
        app: rag-app
    spec:
      containers:
        - name: rag-app
          image: rag-application:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: rag-app-config
            - secretRef:
                name: rag-app-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: rag-app
  namespace: rag-app
spec:
  selector:
    app: rag-app
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP
