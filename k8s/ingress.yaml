apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rag-app-ingress
  namespace: rag-app
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
spec:
  ingressClassName: nginx
  rules:
    - host: rag-app.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rag-app
                port:
                  number: 80
